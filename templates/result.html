<!DOCTYPE html>
<html>
<head>
<title>Ultimate Voting UI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(-45deg, #020617, #0f172a, #020617);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
    color: white;
}

@keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

.container {
    max-width: 700px;
    margin: auto;
    padding: 30px;
}

h1 {
    text-align: center;
    font-weight: 700;
    margin-bottom: 30px;
}

/* Glass card */
.poll {
    margin: 20px 0;
    padding: 15px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(0,255,150,0.1);
    transition: 0.3s;
}

.poll:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 30px rgba(0,255,150,0.3);
}

.label {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
    font-weight: 500;
}

/* Bar container */
.bar-container {
    width: 100%;
    height: 35px;
    background: #020617;
    border-radius: 12px;
    overflow: hidden;
}

/* Animated bar */
.bar {
    height: 100%;
    width: 0%;
    border-radius: 12px;
    background: linear-gradient(90deg, #22c55e, #4ade80);
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 10px;
    font-weight: bold;
    transition: width 0.8s ease-in-out;
    position: relative;
}

/* shimmer effect */
.bar::after {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 50%;
    height: 100%;
    background: rgba(255,255,255,0.2);
    transform: skewX(-20deg);
    animation: shimmer 2s infinite;
}

@keyframes shimmer {
    100% { left: 150%; }
}

.footer {
    text-align: center;
    margin-top: 20px;
    opacity: 0.7;
}
</style>

</head>

<body>

<div class="container">
    <h1>🔥 Live Voting Poll</h1>
    <div id="polls"></div>
    <div class="footer">Auto updating every 2 seconds ⚡</div>
</div>

<script>
function renderPoll(data) {
    let maxVotes = Math.max(...Object.values(data), 1);

    let container = document.getElementById("polls");
    container.innerHTML = "";

    for (let party in data) {
        let count = data[party];
        let width = (count / maxVotes) * 100;

        container.innerHTML += `
            <div class="poll">
                <div class="label">
                    <span>${party}</span>
                    <span>${count} votes</span>
                </div>
                <div class="bar-container">
                    <div class="bar" style="width:${width}%">${count}</div>
                </div>
            </div>
        `;
    }
}

function loadData() {
    fetch('/api/results')
    .then(res => res.json())
    .then(data => {
        renderPoll(data);
    })
    .catch(err => console.error(err));
}

setInterval(loadData, 2000);
loadData();
</script>

</body>
</html>
