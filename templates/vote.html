<!DOCTYPE html>
<html>
<head>
<title>Vote</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(-45deg, #020617, #0f172a, #020617);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
    color: white;
}

@keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

.container {
    max-width: 500px;
    margin: auto;
    padding: 30px;
}

h2 {
    text-align: center;
    margin-bottom: 30px;
}

/* Glass card */
.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 0 20px rgba(0,255,150,0.1);
}

/* Option buttons */
.option {
    margin: 12px 0;
    padding: 15px;
    border-radius: 12px;
    background: #020617;
    cursor: pointer;
    transition: 0.3s;
    border: 2px solid transparent;
}

.option:hover {
    transform: scale(1.03);
    border-color: #22c55e;
}

/* Selected effect */
input[type="radio"] {
    display: none;
}

input[type="radio"]:checked + .option {
    background: linear-gradient(90deg, #22c55e, #4ade80);
    color: black;
    font-weight: bold;
    box-shadow: 0 0 15px #22c55e;
}

/* Submit button */
button {
    margin-top: 20px;
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(90deg, #22c55e, #4ade80);
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #22c55e;
}
</style>

</head>

<body>

<div class="container">
    <h2>🗳️ Vote Your Party</h2>

    <div class="card">
        <form method="post">

            <label>
                <input type="radio" name="party" value="TVK" required>
                <div class="option">TVK</div>
            </label>

            <label>
                <input type="radio" name="party" value="DMK">
                <div class="option">DMK</div>
            </label>

            <label>
                <input type="radio" name="party" value="NTK">
                <div class="option">NTK</div>
            </label>

            <label>
                <input type="radio" name="party" value="ADMK">
                <div class="option">ADMK</div>
            </label>

            <button type="submit">Submit Vote 🚀</button>

        </form>
    </div>
</div>

</body>
</html>
