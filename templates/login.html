<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(-45deg, #020617, #0f172a, #020617);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
    color: white;
}

@keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

.container {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    width: 100%;
    max-width: 400px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    box-shadow: 0 0 30px rgba(0,255,150,0.15);
    text-align: center;
}

h2 {
    margin-bottom: 25px;
}

/* Google Button */
.google-btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    background: white;
    color: black;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    border: none;
}

.google-btn img {
    width: 20px;
}
</style>

</head>

<body>

<div class="container">
    <div class="card">
        <h2>🔐 Secure Voting Login</h2>

        <a href="/login/google">
            <button class="google-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">
                Continue with Google
            </button>
        </a>

        <p>Only verified Gmail users can vote 🔒</p>
    </div>
</div>

</body>
</html>
