<!DOCTYPE html>
<html>
<head>
<title>Vote</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(-45deg, #020617, #0f172a, #020617);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
    color: white;
    overflow: hidden;
}

@keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

.container {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* ===== CAROUSEL ===== */
.carousel {
    position: relative;
    width: 100%;
    max-width: 900px;
    height: 480px;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* CARD BASE */
.card {
    position: absolute;
    width: 260px;
    height: 420px;
    border-radius: 20px;
    overflow: hidden;
    transition: all 0.4s ease;
    cursor: pointer;
}

/* IMAGE */
.card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* NAME */
.card-name {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 12px;
    background: linear-gradient(transparent, rgba(0,0,0,0.9));
    font-weight: bold;
}

/* POSITIONS */
.center {
    transform: scale(1.1);
    z-index: 3;
}

.left {
    transform: translateX(-220px) scale(0.9);
    opacity: 0.5;
    z-index: 2;
}

.right {
    transform: translateX(220px) scale(0.9);
    opacity: 0.5;
    z-index: 2;
}

.hidden {
    opacity: 0;
    z-index: 1;
}

/* ===== GLOW COLORS ===== */
.tvk { box-shadow: 0 0 20px yellow; }
.dmk { box-shadow: 0 0 20px red, 0 0 30px black; }
.ntk { box-shadow: 0 0 25px red; }
.admk { box-shadow: 0 0 25px #22c55e; }

/* BUTTON */
button {
    margin-top: 20px;
    width: 250px;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(90deg, #22c55e, #4ade80);
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
}

</style>
</head>

<body>

<div class="container">

    <h2>📦 swipe & vote</h2>

    <div class="carousel" id="carousel">

        <div class="card tvk" data-party="TVK">
            <img src="/static/tvk.jpg">
            <div class="card-name">TVK</div>
        </div>

        <div class="card dmk" data-party="DMK">
            <img src="/static/dmk.jpg">
            <div class="card-name">DMK</div>
        </div>

        <div class="card ntk" data-party="NTK">
            <img src="/static/ntk.jpg">
            <div class="card-name">NTK</div>
        </div>

        <div class="card admk" data-party="ADMK">
            <img src="/static/admk.jpg">
            <div class="card-name">ADMK</div>
        </div>

    </div>

    <form method="post">
        <input type="hidden" name="party" id="selectedParty">
        <button type="submit">Submit Vote 🚀</button>
    </form>

</div>

<script>

let cards = document.querySelectorAll(".card");
let index = 0;
let selected = null;

function updateCarousel() {
    cards.forEach((card, i) => {
        card.classList.remove("center", "left", "right", "hidden");

        if (i === index) card.classList.add("center");
        else if (i === index - 1) card.classList.add("left");
        else if (i === index + 1) card.classList.add("right");
        else card.classList.add("hidden");
    });
}

updateCarousel();

/* ===== CLICK SELECT ===== */
cards.forEach((card, i) => {

    card.addEventListener("click", () => {
        index = i;
        updateCarousel();
        selectParty(card);
    });

    /* HOVER (LAPTOP MAGIC 🔥) */
    card.addEventListener("mouseenter", () => {
        index = i;
        updateCarousel();
    });
});

/* ===== SWIPE ===== */
let startX = 0;

document.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
    let diff = e.changedTouches[0].clientX - startX;

    if (diff > 80) prev();
    else if (diff < -80) next();
});

/* ===== MOUSE DRAG ===== */
let dragging = false;

document.addEventListener("mousedown", e => {
    dragging = true;
    startX = e.clientX;
});

document.addEventListener("mouseup", e => {
    if (!dragging) return;
    dragging = false;

    let diff = e.clientX - startX;

    if (diff > 80) prev();
    else if (diff < -80) next();
});

/* ===== NAVIGATION ===== */
function next() {
    if (index < cards.length - 1) index++;
    updateCarousel();
}

function prev() {
    if (index > 0) index--;
    updateCarousel();
}

/* ===== SELECT ===== */
function selectParty(card) {
    selected = card.getAttribute("data-party");
    document.getElementById("selectedParty").value = selected;
}

</script>

</body>
</html>
