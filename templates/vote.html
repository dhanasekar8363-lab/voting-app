<!DOCTYPE html>
<html>
<head>
<title>Vote</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(-45deg, #020617, #0f172a, #020617);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
    color: white;
    overflow: hidden;
}

@keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

.container {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* HEADER WITH TOGGLE */
.header {
    display: flex;
    align-items: center;
    gap: 15px;
}

#audioToggle {
    padding: 6px 12px;
    font-size: 14px;
    border-radius: 8px;
    background: #222;
    color: white;
    border: 1px solid #555;
    cursor: pointer;
}

/* ===== CAROUSEL ===== */
.carousel {
    position: relative;
    width: 100%;
    max-width: 900px;
    height: 480px;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

.card {
    position: absolute;
    width: 260px;
    height: 420px;
    border-radius: 20px;
    overflow: hidden;
    transition: all 0.4s ease;
    cursor: pointer;
}

.card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.card-name {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 12px;
    background: linear-gradient(transparent, rgba(0,0,0,0.9));
    font-weight: bold;
}

/* POSITIONS */
.center {
    transform: scale(1.1);
    z-index: 3;
}

.left {
    transform: translateX(-220px) scale(0.9);
    opacity: 0.5;
}

.right {
    transform: translateX(220px) scale(0.9);
    opacity: 0.5;
}

.hidden {
    opacity: 0;
}

/* GLOW */
.tvk { box-shadow: 0 0 20px yellow; }
.dmk { box-shadow: 0 0 20px red, 0 0 30px black; }
.ntk { box-shadow: 0 0 25px red; }
.admk { box-shadow: 0 0 25px #22c55e; }

/* BUTTON */
button.submit {
    margin-top: 20px;
    width: 250px;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(90deg, #22c55e, #4ade80);
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
}

</style>
</head>

<body>

<!-- AUDIO FILES -->
<audio id="tvkSound" src="/static/tvk.mp3"></audio>
<audio id="dmkSound" src="/static/dmk.mp3"></audio>
<audio id="ntkSound" src="/static/ntk.mp3"></audio>
<audio id="admkSound" src="/static/admk.mp3"></audio>

<div class="container">

    <div class="header">
        <h2>📦 swipe & vote</h2>
        <button id="audioToggle">🔇 OFF</button>
    </div>

    <div class="carousel" id="carousel">

        <div class="card tvk" data-party="TVK">
            <img src="/static/tvk.jpg">
            <div class="card-name">TVK</div>
        </div>

        <div class="card dmk" data-party="DMK">
            <img src="/static/dmk.jpg">
            <div class="card-name">DMK</div>
        </div>

        <div class="card ntk" data-party="NTK">
            <img src="/static/ntk.jpg">
            <div class="card-name">NTK</div>
        </div>

        <div class="card admk" data-party="ADMK">
            <img src="/static/admk.jpg">
            <div class="card-name">ADMK</div>
        </div>

    </div>

    <form method="post">
        <input type="hidden" name="party" id="selectedParty">
        <button type="submit" class="submit">Submit Vote 🚀</button>
    </form>

</div>

<script>

/* ===== AUDIO SYSTEM ===== */
let audioEnabled = false;

let sounds = {
    TVK: document.getElementById("tvkSound"),
    DMK: document.getElementById("dmkSound"),
    NTK: document.getElementById("ntkSound"),
    ADMK: document.getElementById("admkSound")
};

function playSound(party) {
    if (!audioEnabled) return;

    Object.values(sounds).forEach(s => {
        s.pause();
        s.currentTime = 0;
    });

    sounds[party].play();
}

/* TOGGLE */
let btn = document.getElementById("audioToggle");

btn.onclick = () => {
    audioEnabled = !audioEnabled;
    btn.innerText = audioEnabled ? "🔊 ON" : "🔇 OFF";

    if (!audioEnabled) {
        Object.values(sounds).forEach(s => s.pause());
    }
};

/* ===== CAROUSEL ===== */

let cards = document.querySelectorAll(".card");
let index = 0;

function updateCarousel() {
    cards.forEach((card, i) => {
        card.classList.remove("center", "left", "right", "hidden");

        if (i === index) {
            card.classList.add("center");
            playSound(card.dataset.party); // 🔥 AUDIO PLAY
        }
        else if (i === index - 1) card.classList.add("left");
        else if (i === index + 1) card.classList.add("right");
        else card.classList.add("hidden");
    });
}

updateCarousel();

/* CLICK + HOVER */
cards.forEach((card, i) => {

    card.addEventListener("click", () => {
        index = i;
        updateCarousel();
        selectParty(card);
    });

    card.addEventListener("mouseenter", () => {
        index = i;
        updateCarousel();
    });

});

/* SWIPE */
let startX = 0;

document.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
    let diff = e.changedTouches[0].clientX - startX;

    if (diff > 80) prev();
    else if (diff < -80) next();
});

/* MOUSE DRAG */
let dragging = false;

document.addEventListener("mousedown", e => {
    dragging = true;
    startX = e.clientX;
});

document.addEventListener("mouseup", e => {
    if (!dragging) return;
    dragging = false;

    let diff = e.clientX - startX;

    if (diff > 80) prev();
    else if (diff < -80) next();
});

/* NAV */
function next() {
    if (index < cards.length - 1) index++;
    updateCarousel();
}

function prev() {
    if (index > 0) index--;
    updateCarousel();
}

/* SELECT */
function selectParty(card) {
    document.getElementById("selectedParty").value = card.dataset.party;
}

</script>

</body>
</html>
