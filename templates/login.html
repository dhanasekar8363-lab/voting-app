<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(-45deg, #020617, #0f172a, #020617);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
    color: white;
}

@keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

.container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Glass card */
.card {
    width: 350px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    box-shadow: 0 0 25px rgba(0,255,150,0.1);
    text-align: center;
}

h2 {
    margin-bottom: 20px;
}

/* Input style */
.input-group {
    position: relative;
    margin-bottom: 20px;
}

.input-group input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: #020617;
    color: white;
    font-size: 14px;
}

/* Floating label */
.input-group label {
    position: absolute;
    top: 50%;
    left: 12px;
    transform: translateY(-50%);
    color: #aaa;
    font-size: 13px;
    transition: 0.3s;
    pointer-events: none;
}

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label {
    top: -8px;
    font-size: 11px;
    color: #22c55e;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(90deg, #22c55e, #4ade80);
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #22c55e;
}

.footer {
    margin-top: 10px;
    font-size: 12px;
    opacity: 0.6;
}
</style>

</head>

<body>

<div class="container">
    <div class="card">
        <h2>🔐 Login to Vote</h2>

        <form method="post">

            <div class="input-group">
                <input type="text" name="phone" required placeholder=" ">
                <label>Enter Mobile Number</label>
            </div>

            <button type="submit">Continue 🚀</button>

        </form>

        <div class="footer">
            One number = one vote
        </div>
    </div>
</div>

</body>
</html>
